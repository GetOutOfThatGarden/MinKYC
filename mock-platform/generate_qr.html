<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Platform: socialprofile.xyz</title>
    <!-- Include QRCode.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }
        button:hover {
            background-color: #2980b9;
        }
        #qrcode-container {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #qrcode {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border: 2px dashed #3498db;
            border-radius: 8px;
        }
        .qr-data-preview {
            margin-top: 20px;
            background-color: #fdfdfd;
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 6px;
            font-size: 12px;
            color: #555;
            text-align: left;
            width: 100%;
            box-sizing: border-box;
            word-wrap: break-word;
        }
        .instruction {
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>socialprofile.xyz</h1>
    <p>Sign Up / Registration</p>
    
    <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" value="John Smith">
    </div>
    
    <div class="form-group">
        <label>
            <input type="checkbox" checked disabled> I confirm that I am over 18. My age will be verified using MinKYC.
        </label>
    </div>

    <button onclick="generateVerificationRequest()">Generate MinKYC Request</button>

    <div id="qrcode-container" style="display: none;">
        <h3>Scan with MinKYC App</h3>
        <div id="qrcode"></div>
        <p class="instruction">Point your mobile camera or MinKYC app at this code</p>
        
        <div class="qr-data-preview">
            <strong>QR Payload Data:</strong>
            <pre id="payloadPreview"></pre>
        </div>
    </div>
</div>

<script>
    let qrCodeInstance = null;

    function generateVerificationRequest() {
        // Generate a random 8-character hex string for the request ID
        const requestId = Math.random().toString(16).substring(2, 10);
        const name = document.getElementById('fullName').value;
        
        const payload = {
            minkyc: true, // protocol identifier
            type: "verify_request",
            platformId: "socialprofile.xyz",
            requestId: requestId,
            condition: "age >= 18",
            userId: name
        };

        const payloadStr = JSON.stringify(payload);
        
        // Show the container
        document.getElementById('qrcode-container').style.display = 'flex';
        
        // Update preview
        document.getElementById('payloadPreview').innerText = JSON.stringify(payload, null, 2);

        // Clear previous QR code if it exists
        const qrContainer = document.getElementById('qrcode');
        qrContainer.innerHTML = '';
        
        // Generate new QR Code
        qrCodeInstance = new QRCode(qrContainer, {
            text: payloadStr,
            width: 256,
            height: 256,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.M
        });
    }
</script>

</body>
</html>
