<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>socialprofile.xyz | Premium Identity Verification</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9945FF;
            --primary-dark: #7a32cc;
            --secondary: #14F195;
            --dark: #0f0f12;
            --card-bg: #1a1a23;
            --text-main: #ffffff;
            --text-dim: #a0a0b8;
            --border: #2e2e3a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--dark);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Subtle Background Gradient */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 10% 20%, rgba(153, 69, 255, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(20, 241, 149, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        .container {
            background-color: var(--card-bg);
            padding: 48px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            max-width: 480px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 16px;
            margin-bottom: 32px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 14px 18px;
            background-color: #252531;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(153, 69, 255, 0.2);
            background-color: #2a2a38;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            background: rgba(153, 69, 255, 0.05);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(153, 69, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .checkbox-group:hover {
            background: rgba(153, 69, 255, 0.1);
            border-color: var(--primary);
        }

        .checkbox-group input {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .checkbox-label {
            font-size: 14px;
            color: var(--text-main);
            margin-bottom: 0;
            text-transform: none;
            font-weight: 400;
            pointer-events: none;
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(153, 69, 255, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(153, 69, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        #qr-result {
            margin-top: 40px;
            display: none;
            flex-direction: column;
            align-items: center;
            animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .qr-card {
            background: white;
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 8px solid var(--primary);
        }

        #qrcode {
            width: 200px;
            height: 200px;
        }

        .qr-instruction {
            color: var(--secondary);
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .qr-instruction::before {
            content: '📱';
            font-size: 20px;
        }

        .payload-preview {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 16px;
            text-align: left;
            font-size: 12px;
            color: #8a8a9d;
            border: 1px solid var(--border);
            width: 100%;
            overflow-x: auto;
            max-height: 150px;
        }

        .payload-preview strong {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dim);
            font-family: 'Outfit', sans-serif;
        }

        code {
            font-family: 'monospace';
            line-height: 1.5;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: var(--text-dim);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div class="logo">socialprofile.xyz</div>
    <p class="subtitle">Complete your profile to join the network</p>
    
    <div id="registration-form">
        <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name">
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>
        
        <div class="checkbox-group" onclick="document.getElementById('ageConfirm').click()">
            <input type="checkbox" id="ageConfirm">
            <label class="checkbox-label">I am at least 18 years old (Verified via MinKYC)</label>
        </div>

        <button onclick="generateRequest()">Create Account</button>
    </div>

    <div id="qr-result">
        <div class="qr-instruction">Scan with your MinKYC App</div>
        <div class="qr-card">
            <div id="qrcode"></div>
        </div>
        
        <div class="payload-preview">
            <strong>ZK Protocol Payload:</strong>
            <pre><code id="payloadText"></code></pre>
        </div>

        <p class="footer" style="margin-top: 20px;">
            <a href="#" onclick="location.reload(); return false;">← Reset Form</a>
        </p>
    </div>

    <div class="footer">
        Powered by <a href="#">MinKYC Zero-Knowledge Protocol</a>
    </div>
</div>

<script>
    function generateRequest() {
        const name = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const ageConfirm = document.getElementById('ageConfirm').checked;

        if (!name || !email) {
            alert('Please enter your name and email.');
            return;
        }

        if (!ageConfirm) {
            alert('Please confirm you are at least 18 years old.');
            return;
        }

        const requestId = Math.random().toString(16).substring(2, 10);
        
        const payload = {
            minkyc: true,
            type: "verify_request",
            platformId: "socialprofile.xyz",
            requestId: requestId,
            condition: "age >= 18",
            userId: name,
            email: email
        };

        const payloadStr = JSON.stringify(payload);
        
        // UI Transitions
        document.getElementById('registration-form').style.display = 'none';
        document.getElementById('qr-result').style.display = 'flex';
        document.querySelector('.subtitle').innerText = 'Scan to verify your identity';
        document.getElementById('payloadText').innerText = JSON.stringify(payload, null, 2);

        // QR Code Generation
        const qrContainer = document.getElementById('qrcode');
        qrContainer.innerHTML = '';
        new QRCode(qrContainer, {
            text: payloadStr,
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    // Stop checkbox click from bubbling if needed, though group handles it
    document.getElementById('ageConfirm').onclick = (e) => e.stopPropagation();
</script>

</body>
</html>
